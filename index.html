<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>裂縫深淵 啟動器 (終極色散折射版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            header: { 900: '#1e2022', 800: '#2d3135', 700: '#3f4448', text: '#f1f2f3' },
            brandYellow: { 400: '#fcd34d', 500: '#f59e0b', 600: '#d97706' }
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ================= 終極色散液態玻璃 ================= */
    .liquid-glass {
      position: relative;
      border-radius: 2rem;
      /* 保持極致清透的底色 */
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
      /* 邊界高光與厚度陰影 */
      box-shadow: 
        inset 1px 1px 2px rgba(255, 255, 255, 0.8),
        inset -1px -1px 3px rgba(0, 0, 0, 0.3),
        0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* 掛載 SVG 色散濾鏡的獨立折射層 */
    .liquid-glass-refraction {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      /* 呼叫底部的終極 SVG 濾鏡，並稍微提高飽和度讓色散更明顯 */
      backdrop-filter: url(#ultimate-refraction) saturate(130%);
      -webkit-backdrop-filter: url(#ultimate-refraction) saturate(130%);
      z-index: -1;
    }

    @keyframes floatDrift {
      0% { transform: translate(-10vw, 5vh) scale(0.8); }
      25% { transform: translate(30vw, -15vh) scale(1.1); }
      50% { transform: translate(70vw, 10vh) scale(0.9); }
      75% { transform: translate(40vw, 25vh) scale(1.2); }
      100% { transform: translate(-10vw, 5vh) scale(0.8); }
    }
  </style>
</head>

    <div class="absolute inset-0" style="background-image: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 40px 40px;"></div>
    <div class="absolute top-1/4 left-0 w-[60vw] h-[60vw] sm:w-[40vw] sm:h-[40vw] bg-brandYellow-500/80 rounded-full blur-[80px]" style="animation: floatDrift 15s infinite ease-in-out;"></div>
  </div>

  <header class="bg-header-900/80 backdrop-blur-md text-header-text border-b border-header-800 px-4 sm:px-6 py-3.5 flex items-center justify-between shadow-md z-20 flex-shrink-0 rounded-t-2xl sm:rounded-t-3xl mt-2 mx-2 sm:mt-3 sm:mx-3 pt-[calc(env(safe-area-inset-top)+0.5rem)]">
    <div class="flex items-center space-x-3">
      <button class="lg:hidden text-white hover:text-brandYellow-400 p-2 -ml-1 rounded-xl focus:outline-none transition cursor-pointer">
        <i class="fa-solid fa-bars text-lg sm:text-xl"></i>
      </button>
      <div class="flex items-center space-x-2.5">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-header-700 to-header-800 flex items-center justify-center text-brandYellow-400 text-sm shadow">
          <i class="fa-solid fa-gamepad"></i>
        </div>
        <div>
          <h1 class="font-bold tracking-wider text-sm sm:text-base text-white">裂縫深淵</h1>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 flex relative overflow-hidden px-2 sm:px-3 pb-2 sm:pb-3">
    <main class="flex-1 p-3 sm:p-6 md:p-8 overflow-y-auto flex flex-col items-center no-scrollbar relative w-full">
      <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-4 sm:gap-5 md:gap-6 items-stretch my-auto py-2 sm:py-4 relative z-10">
        
        <div class="md:col-span-7 liquid-glass p-4 sm:p-5 lg:p-6 flex flex-col justify-between space-y-4 sm:space-y-5 text-white">
          <div class="liquid-glass-refraction pointer-events-none"></div>
          <div>
            <div class="pb-3 border-b border-white/20">
              <h2 class="text-base sm:text-lg font-bold flex items-center space-x-2">
                <i class="fa-solid fa-circle-info text-white/70"></i>
                <span>遊戲版本介紹</span>
              </h2>
            </div>
            <div class="mt-3 sm:mt-4 space-y-3">
              <div class="flex items-center space-x-2 flex-wrap gap-y-1">
                <span class="text-sm sm:text-md font-bold text-white">裂縫深淵：第一個可用版本</span>
                <span class="text-[9px] sm:text-[10px] px-2 py-0.5 rounded-full font-bold bg-white/10 border border-white/20 text-white/90">內部測試版(Alpha版)</span>
              </div>
              <div class="bg-black/20 rounded-2xl p-3 sm:p-4 border border-white/10 shadow-inner">
                <h4 class="text-[11px] sm:text-xs font-bold text-white/90 uppercase tracking-wide mb-1.5 sm:mb-2">更新說明與更動項目：</h4>
                <ul class="list-disc pl-4 sm:pl-5 text-[11px] sm:text-xs text-white/70 space-y-1 sm:space-y-1.5 leading-relaxed">
                  <li>只包含移動的超簡易版本</li>
                </ul>
              </div>
            </div>
          </div>
          <div class="text-[10px] sm:text-[11px] text-white/50 pt-3 border-t border-white/20 flex items-center space-x-1.5 flex-wrap gap-y-1">
            <i class="fa-solid fa-folder-open text-brandYellow-500"></i>
            <span class="font-mono bg-black/30 px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-lg text-[9px] sm:text-[10px] text-white/70">路徑：./html/alpha1.html</span>
          </div>
        </div>

        <div class="md:col-span-5 liquid-glass p-5 sm:p-6 lg:p-8 flex flex-col justify-center items-center text-center relative min-h-[200px] sm:min-h-[220px] md:min-h-auto text-white">
          <div class="liquid-glass-refraction pointer-events-none"></div>
          <div class="absolute -right-6 -bottom-6 opacity-[0.04] text-[100px] sm:text-[150px] pointer-events-none text-white"><i class="fa-solid fa-gamepad"></i></div>

          <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-3xl bg-white/5 flex items-center justify-center text-brandYellow-500 mb-3 sm:mb-4 shadow-inner border border-white/10">
            <i class="fa-solid fa-rocket text-xl sm:text-2xl drop-shadow-md"></i>
          </div>

          <div class="space-y-1 mb-5 sm:mb-6 lg:mb-8 z-10 w-full">
            <h3 class="text-[9px] sm:text-[10px] font-bold text-white/50 uppercase tracking-widest">當前選擇版本</h3>
            <p class="text-sm sm:text-md font-bold text-white truncate px-2">裂縫深淵</p>
            <span class="inline-block text-[9px] sm:text-[10px] font-mono bg-white/10 px-2 py-0.5 rounded-lg text-white/80 border border-white/20 font-semibold mt-1">v0.0.1</span>
          </div>

          <button class="w-full py-3 sm:py-3.5 px-4 sm:px-6 bg-brandYellow-500 hover:bg-brandYellow-400 text-neutral-900 font-extrabold rounded-2xl shadow-[0_0_15px_rgba(245,158,11,0.4)] transition-all transform active:scale-95 flex items-center justify-center space-x-2 sm:space-x-2.5 text-sm sm:text-base lg:text-lg z-10 cursor-pointer">
            <i class="fa-solid fa-circle-play text-lg sm:text-xl"></i>
            <span>開始遊戲</span>
          </button>
        </div>

      </div>
    </main>
  </div>
</body>
